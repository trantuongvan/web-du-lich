<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Nhập</title>

    <link rel="stylesheet" href="../CSS/dang-nhap.css" />
    <!-- <link rel="stylesheet" href="../CSS/bootstrap.min.css" /> -->

    <link rel="icon" type="image/x-icon" href="./logo-icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Sansita:ital,wght@0,400;0,700;0,800;0,900;1,400;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-repeat"
    />
    <link rel="icon" href="../IMG/logo-icon-white.png">
  </head>
  <body>
    <div id="bg"></div>
    <div id="glass-board">
      <a href="./index.html"
        ><img height="70px" src="../IMG/logo-2.webp.svg" id="travlia" alt=""
      /></a>
      <div id="form-container">
        <div id="top">
          <h2>Chào mừng trở lại</h2>
          <h3>Hãy đăng nhập để tiếp tục</h3>
        </div>
        <form id="form" method="post" autocomplete="on">
          <div class="input-group">
            <label for="username">Email</label>
            <br />
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Nhập email"
              required
            />
          </div>
          <div class="input-group">
            <label for="password">Mật khẩu</label>
            <br />
            <div class="input-group-password">
              <input
                type="password"
                id="password"
                name="password"
                aria-describedby="togglePassword"
                placeholder="Nhập mật khẩu"
                required
              />
              <button
                type="button"
                id="togglePassword"
                aria-label="showPassword"
                aria-pressed="false"
              >
                <i class="fa-solid fa-eye"></i>
              </button>
            </div>
          </div>
          <div id="forgot-password-container">
            <a href="404.html" id="forgot-password">Quên mật khẩu?</a>
          </div>
          <div id="error-message" class="show">&nbsp;</div>
          <button type="submit" id="loginBtn">Đăng nhập</button>
          <div id="signup-link">
            <span>Bạn chưa có tài khoản?</span>
            <a href="./dang-ky.html" id="signup">Đăng ký</a>
          </div>
        </form>
      </div>
    </div>

    <script src="../JS/background.js"></script>
    <script type="module" src="../JS/dang-nhap.js"></script>
  </body>
</html>
