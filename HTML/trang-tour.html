<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Sansita:ital,wght@0,400;0,700;0,800;0,900;1,400;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-repeat"
    />
    <link rel="stylesheet" href="../CSS/bootstrap.min.css" />
    <link rel="stylesheet" href="../CSS/trang-tour.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="container py-5">
      <h2 class="text-center mb-4">Tour du lịch trong nước</h2>

      <div class="d-flex justify-content-center gap-3 mb-4 flex-wrap">
        <button class="btn btn-dark filter-domestic" data-type="all">
          Tất cả
        </button>
        <button class="btn btn-dark filter-domestic" data-type="phú quốc">
          Phú Quốc
        </button>
        <button class="btn btn-dark filter-domestic" data-type="nha trang">
          Nha Trang
        </button>
        <button class="btn btn-dark filter-domestic" data-type="đà nẵng">
          Đà Nẵng
        </button>
        <button class="btn btn-dark filter-domestic" data-type="hà nội">
          Ninh Bình-Hạ Long
        </button>
        <button class="btn btn-dark filter-domestic" data-type="hà nội">
          Sapa-Hà Giang
        </button>
      </div>

      <div
        id="domesticCarousel"
        class="carousel slide mb-5"
        data-bs-ride="carousel"
      >
        <div class="carousel-inner" id="domesticContainer"></div>

        <button
          class="carousel-control-prev"
          type="button"
          data-bs-target="#domesticCarousel"
          data-bs-slide="prev"
        >
          <span
            class="carousel-control-prev-icon bg-dark rounded-circle p-3"
          ></span>
        </button>

        <button
          class="carousel-control-next"
          type="button"
          data-bs-target="#domesticCarousel"
          data-bs-slide="next"
        >
          <span
            class="carousel-control-next-icon bg-dark rounded-circle p-3"
          ></span>
        </button>
      </div>
    </div>

    <div class="container py-5">
      <h2 class="text-center mb-4">Tour du lịch nước ngoài</h2>

      <div class="d-flex justify-content-center gap-3 mb-4 flex-wrap">
        <button class="btn btn-dark filter-international" data-type="all">
          Tất cả
        </button>
        <button class="btn btn-dark filter-international" data-type="seoul">
          Hàn Quốc
        </button>
        <button class="btn btn-dark filter-international" data-type="osaka">
          Nhật Bản
        </button>
        <button class="btn btn-dark filter-international" data-type="dubai">
          Dubai
        </button>
        <button class="btn btn-dark filter-international" data-type="china">
          Trung Quốc
        </button>
        <button class="btn btn-dark filter-international" data-type="singapore">
          Singapore
        </button>
      </div>

      <div
        id="internationalCarousel"
        class="carousel slide"
        data-bs-ride="carousel"
      >
        <div class="carousel-inner" id="internationalContainer"></div>

        <button
          class="carousel-control-prev"
          type="button"
          data-bs-target="#internationalCarousel"
          data-bs-slide="prev"
        >
          <span
            class="carousel-control-prev-icon bg-dark rounded-circle p-3"
          ></span>
        </button>

        <button
          class="carousel-control-next"
          type="button"
          data-bs-target="#internationalCarousel"
          data-bs-slide="next"
        >
          <span
            class="carousel-control-next-icon bg-dark rounded-circle p-3"
          ></span>
        </button>
      </div>
    </div>

    <script src="../JS/trang-tour.js"></script>
    <script src="../JS/bootstrap.bundle.min.js"></script>
  </body>
</html>
